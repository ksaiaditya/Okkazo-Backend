server:
  port: 8080

spring:
  application:
    name: api-gateway
  
  # Increase buffer size for large file uploads through gateway
  codec:
    max-in-memory-size: 50MB
  
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          routes:
            # Auth Service Internal Routes (Admin only)
            - id: auth-service-internal
              uri: lb://auth-service
              predicates:
                - Path=/auth/internal/**
              filters:
                - RewritePath=/auth/(?<segment>.*), /${segment}
                - name: AuthenticationFilter
                - name: RoleAuthorizationFilter
                  args:
                    roles: ADMIN

            # Auth Service Admin Routes (Admin/Manager only)
            - id: auth-service-admin
              uri: lb://auth-service
              predicates:
                - Path=/auth/admin/**
              filters:
                - RewritePath=/auth/(?<segment>.*), /${segment}
                - name: AuthenticationFilter
                - name: RoleAuthorizationFilter
                  args:
                    roles: ADMIN,MANAGER

            # Auth Service Routes (Public - No Authentication Required)
            - id: auth-service-secured-change-password
              uri: lb://auth-service
              predicates:
                - Path=/auth/change-password
              filters:
                - RewritePath=/auth/(?<segment>.*), /${segment}
                - name: AuthenticationFilter
                - name: RoleAuthorizationFilter
                  args:
                    roles: USER,VENDOR,ADMIN,MANAGER

            - id: auth-service-public
              uri: lb://auth-service
              predicates:
                - Path=/auth/**
              filters:
                - RewritePath=/auth/(?<segment>.*), /${segment}

            # User Service Routes (Will be added when Node.js service is ready)
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/users/**
              filters:
                - RewritePath=/api/users/(?<segment>.*), /${segment}
                - name: AuthenticationFilter
                - name: RoleAuthorizationFilter
                  args:
                    roles: USER,VENDOR,ADMIN,MANAGER

            # Admin Service Routes - Manager Management (Admin Only)
            - id: admin-service-managers
              uri: lb://admin-service
              predicates:
                - Path=/api/admin/managers/**,/api/admin/ledger/**,/api/admin/reports/**,/api/admin/dashboard/**
              filters:
                - RewritePath=/api/admin/(?<segment>.*), /${segment}
                - name: AuthenticationFilter
                - name: RoleAuthorizationFilter
                  args:
                    roles: ADMIN

            # Admin Routes - Commission (Admin only, stored in event-service)
            - id: event-service-admin-commission
              uri: lb://EVENT-SERVICE
              predicates:
                - Path=/api/admin/commission/**
              filters:
                - RewritePath=/api/admin/(?<segment>.*), /admin/${segment}
                - name: AuthenticationFilter
                - name: RoleAuthorizationFilter
                  args:
                    roles: ADMIN

            # Admin Routes - Admin Only (user-service)
            - id: admin-routes
              uri: lb://user-service
              predicates:
                - Path=/api/admin/**
              filters:
                - RewritePath=/api/admin/(?<segment>.*), /admin/${segment}
                - name: AuthenticationFilter
                - name: RoleAuthorizationFilter
                  args:
                    roles: ADMIN

            # Vendor Service Routes - Vendor, Admin, Manager
            - id: vendor-service
              uri: lb://vendor-service
              predicates:
                - Path=/api/vendor/**
              filters:
                - name: AuthenticationFilter
                - name: RoleAuthorizationFilter
                  args:
                    roles: USER,VENDOR,ADMIN,MANAGER

            # Manager Routes - Manager, Admin
            - id: manager-routes
              uri: lb://user-service
              predicates:
                - Path=/api/manager/**
              filters:
                - RewritePath=/api/manager/(?<segment>.*), /manager/${segment}
                - name: AuthenticationFilter
                - name: RoleAuthorizationFilter
                  args:
                    roles: MANAGER,ADMIN

            # Email Service Routes (Admin Only)
            - id: email-service
              uri: lb://email-service
              predicates:
                - Path=/api/email/**
              filters:
                - RewritePath=/api/email/(?<segment>.*), /${segment}
                - name: AuthenticationFilter
                - name: RoleAuthorizationFilter
                  args:
                    roles: ADMIN

            # Event Service Routes - Planning (All authenticated users)
            - id: event-service
              uri: lb://EVENT-SERVICE
              predicates:
                - Path=/api/events/**
              filters:
                - RewritePath=/api/events/(?<segment>.*), /${segment}
                - name: AuthenticationFilter
                - name: RoleAuthorizationFilter
                  args:
                    roles: USER,VENDOR,ADMIN,MANAGER

            # Order Service Routes - Payments (All authenticated users)
            - id: order-service-webhook
              uri: lb://order-service
              predicates:
                - Path=/api/orders/webhook
              filters:
                - RewritePath=/api/orders/webhook, /orders/webhook

            # Order Service Routes - Payments (All authenticated users)
            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/api/orders/**
              filters:
                - RewritePath=/api/orders/(?<segment>.*), /orders/${segment}
                - name: AuthenticationFilter
                - name: RoleAuthorizationFilter
                  args:
                    roles: USER,VENDOR,ADMIN,MANAGER

            # Chat Service Routes (All authenticated users)
            - id: chat-service
              uri: lb://chat-service
              predicates:
                - Path=/api/chat/**
              filters:
                - name: AuthenticationFilter
                - name: RoleAuthorizationFilter
                  args:
                    roles: USER,VENDOR,ADMIN,MANAGER

            # Chat Socket.IO WebSocket/long-polling upgrade route
            # Auth is validated by chat-service during socket handshake (auth.token).
            - id: chat-service-socket
              uri: lb:ws://chat-service
              predicates:
                - Path=/socket.io/**

            # Notification Service Routes (All authenticated users)
            - id: notification-service
              uri: lb://notification-service
              predicates:
                - Path=/api/notifications,/api/notifications/**
              filters:
                - RewritePath=/api/notifications/?(?<segment>.*), /${segment}
                - name: AuthenticationFilter
                - name: RoleAuthorizationFilter
                  args:
                    roles: USER,VENDOR,ADMIN,MANAGER

          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - ${FRONTEND_URL:http://localhost:5173}
                  - ${FRONTEND_URL_FALLBACK:http://localhost:3000}
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - PATCH
                  - OPTIONS
                allowedHeaders: "*"
                allowCredentials: true
                maxAge: 3600

# JWT Configuration (Must match auth-service)
jwt:
  secret: ${JWT_SECRET:your-default-secret-key-change-this-in-production}

# Eureka Client Configuration
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

# Logging
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.okkazo.apigateway: DEBUG
